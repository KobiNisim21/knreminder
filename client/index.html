<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport: viewport-fit=cover is CRITICAL for iOS notch/Dynamic Island ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- ── SEO ───────────────────────────────────────────────────────────────── -->
    <title>KN תזכורות</title>
    <meta name="description" content="אפליקציית תזכורות אישית — מהירה, נוחה, ומתחברת ל-Telegram" />
    <meta name="keywords" content="תזכורות, reminder, פרודוקטיביות" />
    <meta name="author" content="KobiNisim" />
    <meta name="robots" content="noindex" />

    <!-- ── PWA Manifest ──────────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Theme color (browser tab & Android status bar) ───────────────────── -->
    <!-- iOS uses the apple-mobile-web-app-status-bar-style below instead -->
    <meta name="theme-color" content="#2196F3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1565C0" media="(prefers-color-scheme: dark)" />

    <!-- ══════════════════════════════════════════════════════════════════════════
         iOS PWA Configuration
         These tags are ONLY respected by Safari on iOS/iPadOS.
         They have no effect on Android or desktop browsers.
    ══════════════════════════════════════════════════════════════════════════ -->

    <!-- Enable standalone (full-screen, no Safari chrome) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Status bar appearance when in standalone mode:
         "black-translucent" = content flows under the status bar (true full-screen).
         Requires padding-top: env(safe-area-inset-top) on the header — already
         applied via the .pt-safe utility in index.css. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- App name shown under the icon on the iOS home screen -->
    <meta name="apple-mobile-web-app-title" content="תזכורות" />

    <!-- Home screen icon (iOS ignores the manifest icons — needs this explicit tag) -->
    <!-- 180×180 is required for iPhone retina; iPad uses up to 167×167 -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- ── iOS Splash Screens (Launch Images) ────────────────────────────────
         iOS requires device-specific splash images declared via <link> tags.
         Without these, iOS shows a white screen during app launch.
         The single image below covers all modern iPhones adequately.
         For production, generate the full set with:
           npx pwa-asset-generator icons/icon-512.png public/icons --splash-only --index index.html
    ─────────────────────────────────────────────────────────────────────── -->
    <!-- iPhone 14 Pro Max / 15 Pro Max (430×932 @3x) -->
    <link rel="apple-touch-startup-image"
      href="/icons/apple-touch-icon.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 14 Pro / 15 Pro (393×852 @3x) -->
    <link rel="apple-touch-startup-image"
      href="/icons/apple-touch-icon.png"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 14 / 13 / 12 (390×844 @3x) -->
    <link rel="apple-touch-startup-image"
      href="/icons/apple-touch-icon.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone SE 3rd gen / 8 / 7 / 6 (375×667 @2x) -->
    <link rel="apple-touch-startup-image"
      href="/icons/apple-touch-icon.png"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />

    <!-- ── Favicon ────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="shortcut icon" href="/icons/icon-192.png" />

    <!-- ── Microsoft / Windows tiles ─────────────────────────────────────── -->
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />
    <meta name="msapplication-TileColor" content="#F44336" />

    <!-- ── Google Fonts: Rubik + Assistant (Hebrew-first) ────────────────── -->
    <!-- dns-prefetch reduces latency before preconnect kicks in -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&family=Assistant:wght@400;600&display=swap"
    />
  </head>
  <body>
    <!-- Root mount point -->
    <div id="root"></div>

    <!-- App entry (Vite processes this) -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
