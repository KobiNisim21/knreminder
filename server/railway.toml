# KN Reminder — Railway Deployment Configuration
# This file tells Railway how to build and run the Node.js backend.
# Place this file in: server/railway.toml

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[healthcheck]
path = "/api/health"
timeoutSecs = 30
